version: "3.9"

services:

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
    depends_on:
      - redis
      - db
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1

  worker:
    build: ./worker
    depends_on:
      - redis
      - db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - backend

  redis:
    image: redis:7

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gitanalytics
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
